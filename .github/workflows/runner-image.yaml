name: Build Runner Image

on:
  push:
    branches: [main]
    paths:
      - runner/Dockerfile
      - runner/start.sh
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runner/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/miramar-labs-org/github-runner-${{ vars.REPO_NAME }}:latest
            ghcr.io/miramar-labs-org/github-runner-${{ vars.REPO_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/miramar-labs-org/github-runner-${{ vars.REPO_NAME }}:buildcache-v2
          cache-to: type=registry,ref=ghcr.io/miramar-labs-org/github-runner-${{ vars.REPO_NAME }}:buildcache-v2,mode=max
