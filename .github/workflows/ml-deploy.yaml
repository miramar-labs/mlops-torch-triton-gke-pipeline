name: ML Deploy

on:
  workflow_run:
    workflows: ["ML Build Push"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'GAR image tag to deploy (git SHA — find in Actions → ML Build Push)'
        required: true

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: miramar-platform
  GAR_LOCATION: us-west1
  GAR_REPOSITORY: apps
  APP_NAME: triton-text-classifier
  GKE_CLUSTER_NAME: miramar-shared-gke
  GKE_ZONE: us-west1-a
  K8S_NAMESPACE: ${{ vars.REPO_NAME }}
  DEPLOYMENT_NAME: triton

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: [self-hosted, wsl2]
    environment:
      name: gke-ml
      url: https://console.cloud.google.com/kubernetes/workload/overview?project=miramar-platform

    steps:
      - uses: actions/checkout@v5

      - name: Resolve image tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          else
            IMAGE_TAG="${{ github.event.workflow_run.head_sha }}"
          fi
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER_NAME }}
          location: ${{ env.GKE_ZONE }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Deploy Triton
        run: |
          IMAGE="${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${APP_NAME}:${IMAGE_TAG}"
          sed "s|IMAGE_PLACEHOLDER|${IMAGE}|g" k8s/triton.yaml \
            | python3 -c "import sys; docs=sys.stdin.read().split('\n---\n'); print('\n---\n'.join(d for d in docs if 'kind: Namespace' not in d))" \
            | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/"$DEPLOYMENT_NAME" \
            -n "$K8S_NAMESPACE" \
            --timeout=300s

      - name: Show deployed resources
        if: always()
        run: kubectl -n "$K8S_NAMESPACE" get deploy,pods,svc -o wide

      - name: Describe deployment on failure
        if: failure()
        run: |
          kubectl -n "$K8S_NAMESPACE" describe deployment "$DEPLOYMENT_NAME"
          kubectl -n "$K8S_NAMESPACE" describe pods -l app="$DEPLOYMENT_NAME"
