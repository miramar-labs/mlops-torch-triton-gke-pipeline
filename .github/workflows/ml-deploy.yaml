name: ML Deploy

on:
  workflow_run:
    workflows: ["ML Train"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Training workflow run ID to deploy from'
        required: true

permissions:
  contents: read
  id-token: write
  actions: read

env:
  GCP_PROJECT_ID: miramar-platform
  GAR_LOCATION: us-west1
  GAR_REPOSITORY: apps
  APP_NAME: triton-text-classifier
  GKE_CLUSTER_NAME: miramar-shared-gke
  GKE_ZONE: us-west1-a
  K8S_NAMESPACE: ml-serving
  DEPLOYMENT_NAME: triton

jobs:
  build-and-deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ vars.RUNNER_LABELS_MSI || 'msi-wsl2' }}
    environment:
      name: gke-ml
      url: https://console.cloud.google.com/kubernetes/workload/overview?project=miramar-platform

    steps:
      - uses: actions/checkout@v4

      - name: Resolve run ID and image tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            RUN_ID="${{ github.event.workflow_run.id }}"
            SHA="${{ github.event.workflow_run.head_sha }}"
          else
            RUN_ID="${{ github.event.inputs.run_id }}"
            SHA=$(gh run view "$RUN_ID" --json headSha -q .headSha)
          fi
          echo "RUN_ID=${RUN_ID}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${SHA}" >> "$GITHUB_ENV"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download ONNX model
        uses: actions/download-artifact@v4
        with:
          name: onnx-model
          path: ml/output
          run-id: ${{ env.RUN_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker "${GAR_LOCATION}-docker.pkg.dev" --quiet

      - name: Build Triton serving image
        run: |
          docker build -f ml/Dockerfile.serve \
            -t "${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${APP_NAME}:latest" \
            -t "${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${APP_NAME}:${IMAGE_TAG}" \
            .

      - name: Push to GAR
        run: |
          docker push "${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${APP_NAME}:latest"
          docker push "${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${APP_NAME}:${IMAGE_TAG}"

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER_NAME }}
          location: ${{ env.GKE_ZONE }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Deploy Triton
        run: |
          IMAGE="${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${APP_NAME}:${IMAGE_TAG}"
          sed "s|IMAGE_PLACEHOLDER|${IMAGE}|g" k8s/triton.yaml \
            | python3 -c "import sys; docs=sys.stdin.read().split('\n---\n'); print('\n---\n'.join(d for d in docs if 'kind: Namespace' not in d))" \
            | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/"$DEPLOYMENT_NAME" \
            -n "$K8S_NAMESPACE" \
            --timeout=300s

      - name: Show deployed resources
        if: always()
        run: kubectl -n "$K8S_NAMESPACE" get deploy,pods,svc -o wide

      - name: Describe deployment on failure
        if: failure()
        run: |
          kubectl -n "$K8S_NAMESPACE" describe deployment "$DEPLOYMENT_NAME"
          kubectl -n "$K8S_NAMESPACE" describe pods -l app="$DEPLOYMENT_NAME"
