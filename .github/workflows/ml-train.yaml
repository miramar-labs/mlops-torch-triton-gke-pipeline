name: ML Train

on:
  workflow_run:
    workflows: ["ML Train Test"]
    types: [completed]
  workflow_dispatch:
    inputs:
      epochs:
        description: 'Training epochs'
        default: '3'
        required: false
      experiment:
        description: 'MLflow experiment name'
        default: 'text-classifier'
        required: false

permissions:
  contents: read

jobs:
  train:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: [self-hosted, dgx]

    steps:
      - uses: actions/checkout@v5

      - name: Build training image
        run: docker build --no-cache -f ml/Dockerfile.train -t ml-trainer:latest .

      - name: Train model
        run: |
          mkdir -p ml/output
          docker run --rm --gpus all \
            --network host \
            -v "$GITHUB_WORKSPACE/ml/output:/output" \
            -v "$HOME/.cache/huggingface:/root/.cache/huggingface" \
            -e MLFLOW_TRACKING_URI="http://localhost:5000" \
            -e MLFLOW_EXPERIMENT_NAME="${{ github.event.inputs.experiment || 'text-classifier' }}" \
            -e EPOCHS="${{ github.event.inputs.epochs || '3' }}" \
            ml-trainer:latest

      - name: Upload ONNX model
        uses: actions/upload-artifact@v4
        with:
          name: onnx-model
          path: ml/output/model.onnx
          retention-days: 30
