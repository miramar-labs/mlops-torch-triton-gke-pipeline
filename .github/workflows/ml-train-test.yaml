name: ML Train Test

on:
  push:
    branches: [main]
    paths:
      - ml/train.py
      - ml/test_train.py
      - ml/Dockerfile.train
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: [self-hosted, dgx]

    steps:
      - uses: actions/checkout@v4

      - name: Build training image
        run: docker build -f ml/Dockerfile.train -t ml-trainer:latest .

      - name: Run tests
        run: |
          docker run --rm \
            -v "$HOME/.cache/huggingface:/root/.cache/huggingface" \
            ml-trainer:latest python -m pytest test_train.py -v
